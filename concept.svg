<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="swa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f6cbd"/>
      <stop offset="1" stop-color="#1b8ae0"/>
    </linearGradient>
    <linearGradient id="fn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2a900"/>
      <stop offset="1" stop-color="#ffca3a"/>
    </linearGradient>
    <linearGradient id="kv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2aa87a"/>
      <stop offset="1" stop-color="#3fd39a"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#a970ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9fb3c8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" fill="#e6eef8" font-size="34" font-weight="700">Serverless Chat UI for Azure AI Foundry</text>
  <text x="600" y="90" text-anchor="middle" fill="#8aa0ba" font-size="17">Enterprise white-label chat · Azure Static Web Apps · ~$0 base cost</text>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="70" y="300" rx="18" width="180" height="150" fill="#1c2740" stroke="#2f3f5f"/>
    <circle cx="160" cy="360" r="26" fill="#cfe2f7"/>
    <rect x="128" y="392" rx="16" width="64" height="34" fill="#cfe2f7"/>
    <text x="160" y="440" text-anchor="middle" fill="#e6eef8" font-size="17" font-weight="600">End User</text>
  </g>

  <!-- SWA -->
  <g filter="url(#shadow)">
    <rect x="320" y="250" rx="18" width="240" height="250" fill="url(#swa)"/>
    <text x="440" y="288" text-anchor="middle" fill="#fff" font-size="19" font-weight="700">Azure Static Web App</text>
    <rect x="345" y="308" rx="10" width="190" height="70" fill="rgba(255,255,255,0.16)"/>
    <text x="440" y="338" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Static Frontend</text>
    <text x="440" y="360" text-anchor="middle" fill="#eaf3ff" font-size="13">React 19 · Vite · Tailwind</text>
    <rect x="345" y="392" rx="10" width="190" height="70" fill="rgba(255,255,255,0.16)"/>
    <text x="440" y="422" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">API Proxy /api/*</text>
    <text x="440" y="444" text-anchor="middle" fill="#eaf3ff" font-size="13">Async poll pattern</text>
  </g>

  <!-- Function -->
  <g filter="url(#shadow)">
    <rect x="640" y="290" rx="18" width="220" height="170" fill="url(#fn)"/>
    <text x="750" y="332" text-anchor="middle" fill="#20160a" font-size="18" font-weight="700">Azure Functions</text>
    <text x="750" y="360" text-anchor="middle" fill="#3a2a10" font-size="14">Consumption · Node</text>
    <text x="750" y="392" text-anchor="middle" fill="#3a2a10" font-size="14">postPrompt · status</text>
    <text x="750" y="416" text-anchor="middle" fill="#3a2a10" font-size="14">messages</text>
    <text x="750" y="440" text-anchor="middle" fill="#5b4a26" font-size="12">Managed Identity</text>
  </g>

  <!-- AI Foundry -->
  <g filter="url(#shadow)">
    <rect x="930" y="290" rx="18" width="200" height="170" fill="url(#ai)"/>
    <text x="1030" y="336" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Azure AI Foundry</text>
    <text x="1030" y="364" text-anchor="middle" fill="#efe6ff" font-size="14">Persistent Agent</text>
    <text x="1030" y="388" text-anchor="middle" fill="#efe6ff" font-size="14">threads · runs</text>
    <text x="1030" y="412" text-anchor="middle" fill="#d8c6ff" font-size="12">MCP tool timeline</text>
  </g>

  <!-- Connections -->
  <line x1="250" y1="375" x2="318" y2="375" stroke="#9fb3c8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="562" y1="375" x2="638" y2="375" stroke="#9fb3c8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="862" y1="375" x2="928" y2="375" stroke="#9fb3c8" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="285" y="365" text-anchor="middle" fill="#8aa0ba" font-size="12">chat</text>
  <text x="600" y="365" text-anchor="middle" fill="#8aa0ba" font-size="12">/api</text>
  <text x="895" y="365" text-anchor="middle" fill="#8aa0ba" font-size="12">secure auth</text>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" fill="#6f88a6" font-size="13">Project XiaoCao · white-label · Azure Marketplace deployable</text>
</svg>
